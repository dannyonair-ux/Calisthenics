<!DOCTYPE html>
<html lang="it">
<head>
  <link rel="icon" type="image/png" href="icona.png">
<link rel="apple-touch-icon" href="icona.png">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0f1117">
  <link rel="manifest" href="manifest.json">
<title>Zero2Hero</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0f1117;--surface:#181c26;--surface2:#1f2435;--border:rgba(255,255,255,0.07);
  --accent:#c8f55a;--accent2:#5af5c8;--accent3:#f55a8c;
  --text:#f0f0ec;--muted:#8890a8;
  --push:#f55a8c;--pull:#5af5c8;--legs:#f5c85a;--core:#5a8cf5;--full:#c8f55a;
  --r:14px;--r-sm:8px;
  --fh:'Syne',sans-serif;--fm:'DM Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{height:100%}
body{height:100%;background:var(--bg);color:var(--text);font-family:var(--fm);overflow:hidden}

/* SPLASH */
#splash{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:1000;gap:10px;transition:opacity 0.5s}
#splash .logo{font-family:var(--fh);font-size:clamp(28px,10vw,52px);font-weight:800;color:var(--accent);letter-spacing:-2px;text-align:center;padding:0 16px}
#splash .sub{font-size:clamp(9px,3vw,11px);color:var(--muted);letter-spacing:3px;text-align:center;padding:0 16px}
#splash.hide{opacity:0;pointer-events:none}

/* APP SHELL - fixed layout, scroll only inside content */
#app{position:fixed;inset:0;display:flex;flex-direction:column;overflow:hidden}

/* TOP BAR */
.topbar{flex-shrink:0;padding:14px 20px 10px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);background:var(--bg)}
.topbar-logo{font-family:var(--fh);font-size:22px;font-weight:800;color:var(--accent);letter-spacing:-1px}
.topbar-date{font-size:11px;color:var(--muted);margin-top:2px}
.topbar-streak{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--accent)}
.streak-dot{width:8px;height:8px;border-radius:50%;background:var(--accent)}

/* DAY TABS */
.day-tabs{flex-shrink:0;display:flex;gap:6px;padding:10px 20px;overflow-x:auto;scrollbar-width:none;background:var(--bg);border-bottom:1px solid var(--border)}
.day-tabs::-webkit-scrollbar{display:none}
.day-tab{flex-shrink:0;padding:6px 14px;border-radius:20px;font-size:11px;font-weight:500;font-family:var(--fh);border:1px solid var(--border);background:var(--surface);color:var(--muted);cursor:pointer;transition:all 0.2s}
.day-tab.today{border-color:var(--accent);color:var(--accent)}
.day-tab.active{background:var(--accent);color:var(--bg);border-color:var(--accent);font-weight:700}
.day-tab.done-tab{border-color:rgba(200,245,90,0.3);color:rgba(200,245,90,0.5)}

/* MAIN CONTENT AREA — THIS IS THE SCROLLABLE PART */
#main-view{flex:1;overflow:hidden;display:flex;flex-direction:column;min-height:0}
.scroll-area{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0 16px 100px}

/* HISTORY VIEW */
#history-view{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0 16px 100px;display:none}
#history-view.visible{display:block}
#main-view.hidden{display:none}

/* BOTTOM NAV */
.bottom-bar{flex-shrink:0;background:var(--bg);border-top:1px solid var(--border);padding:12px 24px env(safe-area-inset-bottom,20px);display:flex;justify-content:space-around}
.nav-btn{display:flex;flex-direction:column;align-items:center;gap:4px;background:none;border:none;color:var(--muted);font-family:var(--fm);font-size:10px;cursor:pointer;transition:color 0.2s;padding:4px 16px}
.nav-btn.active{color:var(--accent)}
.nav-icon{font-size:20px}

/* DAY HEADER */
.day-header{padding:14px 0 10px}
.day-name{font-family:var(--fh);font-size:26px;font-weight:800;letter-spacing:-1px;line-height:1}
.day-meta{display:flex;align-items:center;gap:8px;margin-top:6px;flex-wrap:wrap}
.focus-badge{padding:3px 10px;border-radius:20px;font-size:10px;font-weight:600;font-family:var(--fh);letter-spacing:1px}
.day-progress{margin-top:10px;height:3px;background:var(--surface2);border-radius:2px;overflow:hidden}
.day-progress-fill{height:100%;background:var(--accent);border-radius:2px;transition:width 0.4s}

/* PHASE CARDS (warmup/cooldown/rest) */
.phase-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;margin-bottom:10px}
.phase-label{font-size:9px;color:var(--muted);letter-spacing:2px;font-family:var(--fh);font-weight:600;margin-bottom:6px}
.phase-row{display:flex;align-items:flex-start;gap:10px;margin-bottom:6px}
.phase-row:last-child{margin-bottom:0}
.phase-icon{font-size:14px;flex-shrink:0;margin-top:1px}
.phase-text{font-size:12px;color:var(--text);line-height:1.5}
.phase-note{font-size:11px;color:var(--muted);line-height:1.5;margin-top:2px}
.rest-chip{display:inline-flex;align-items:center;gap:5px;background:rgba(200,245,90,0.1);border:1px solid rgba(200,245,90,0.2);border-radius:20px;padding:3px 10px;font-size:11px;color:var(--accent);margin:8px 0 4px}

/* EXERCISE CARD */
.ex-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);margin-bottom:10px;overflow:hidden;transition:border-color 0.2s}
.ex-card.done-card{border-color:rgba(200,245,90,0.3);background:rgba(200,245,90,0.03)}
.ex-header{padding:12px 14px;cursor:pointer;display:flex;align-items:center;gap:10px}
.ex-num{width:30px;height:30px;border-radius:50%;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--muted);flex-shrink:0;font-family:var(--fh);font-weight:700;transition:all 0.2s}
.ex-card.done-card .ex-num{background:var(--accent);color:var(--bg);border-color:var(--accent)}
.ex-main{flex:1;min-width:0}
.ex-name{font-family:var(--fh);font-size:14px;font-weight:700}
.ex-sets-line{font-size:12px;color:var(--muted);margin-top:2px}
.ex-level-row{display:flex;align-items:center;gap:6px;margin-top:4px;flex-wrap:wrap}
.lv-badge{font-size:9px;padding:2px 7px;border-radius:10px;font-family:var(--fh);font-weight:700;letter-spacing:0.5px}
.lv1{background:rgba(200,245,90,0.15);color:var(--accent)}
.lv2{background:rgba(245,200,90,0.15);color:var(--legs)}
.lv3{background:rgba(245,90,140,0.15);color:var(--push)}
.lv4{background:rgba(90,140,245,0.15);color:var(--core)}
.lv5{background:rgba(90,245,200,0.15);color:var(--pull)}
.lv6{background:rgba(180,90,245,0.15);color:#c85af5}
.consec-dots{display:flex;gap:3px}
.cdot{width:7px;height:7px;border-radius:50%;border:1px solid var(--muted)}
.cdot.filled{background:var(--accent);border-color:var(--accent)}
.ex-chevron{color:var(--muted);font-size:16px;transition:transform 0.25s;flex-shrink:0}
.ex-card.open .ex-chevron{transform:rotate(180deg)}

/* EXPANDED DETAIL */
.ex-detail{max-height:0;overflow:hidden;transition:max-height 0.35s ease}
.ex-card.open .ex-detail{max-height:800px}
.ex-detail-inner{padding:4px 14px 14px;border-top:1px solid var(--border)}

.prog-bar-wrap{margin:10px 0 8px}
.prog-bar-label{display:flex;justify-content:space-between;font-size:10px;color:var(--muted);margin-bottom:4px}
.prog-track{height:4px;background:var(--surface2);border-radius:2px;display:flex;gap:2px}
.prog-seg{flex:1;height:100%;border-radius:1px;transition:background 0.3s}
.prog-seg.seg-done{background:var(--accent)}
.prog-seg.seg-current{background:rgba(200,245,90,0.4)}
.prog-seg.seg-future{background:var(--surface2)}

.muscles-tag{display:inline-block;padding:3px 10px;background:var(--surface2);border-radius:20px;font-size:10px;color:var(--muted);margin-bottom:8px}
.video-btn{display:flex;align-items:center;gap:8px;padding:10px 12px;background:rgba(90,140,245,0.1);border:1px solid rgba(90,140,245,0.25);border-radius:var(--r-sm);color:var(--core);font-size:12px;text-decoration:none;margin-bottom:10px}
.play-icon{width:22px;height:22px;border-radius:50%;background:var(--core);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.play-icon svg{width:10px;fill:var(--bg)}
.ex-tip{font-size:12px;color:var(--accent2);padding:10px 12px;background:rgba(90,245,200,0.06);border-radius:var(--r-sm);margin-bottom:10px;line-height:1.5}
.ex-steps{list-style:none;margin-bottom:10px}
.ex-steps li{font-size:12px;color:var(--muted);padding:5px 0;border-bottom:1px solid var(--border);display:flex;gap:8px}
.ex-steps li:last-child{border-bottom:none}
.step-n{color:var(--accent);font-weight:700;flex-shrink:0}

.next-box{background:rgba(200,245,90,0.05);border:1px solid rgba(200,245,90,0.15);border-radius:var(--r-sm);padding:10px 12px;margin-bottom:10px}
.next-label{font-size:9px;color:rgba(200,245,90,0.6);letter-spacing:1.5px;font-family:var(--fh);margin-bottom:3px}
.next-name{font-size:12px;color:var(--accent);font-family:var(--fh);font-weight:700}
.next-sub{font-size:11px;color:var(--muted);margin-top:2px}

/* LOG */
.log-section{padding:10px 14px;background:var(--surface2);border-top:1px solid var(--border)}
.log-label{font-size:9px;color:var(--muted);letter-spacing:1.5px;font-family:var(--fh);margin-bottom:8px}
.log-sets{display:flex;gap:6px;flex-wrap:wrap}
.set-btn{min-width:56px;padding:7px 10px;border-radius:var(--r-sm);background:var(--surface);border:1px solid var(--border);color:var(--muted);font-size:11px;font-family:var(--fm);cursor:pointer;text-align:center;transition:all 0.15s;display:flex;flex-direction:column;align-items:center;gap:2px}
.set-btn .set-lbl{font-size:9px;color:var(--muted)}
.set-btn.set-done{border-color:var(--accent);color:var(--accent);background:rgba(200,245,90,0.08)}
.set-btn.set-done .set-lbl{color:rgba(200,245,90,0.5)}

/* TOAST */
.toast{position:fixed;top:80px;left:50%;transform:translateX(-50%) translateY(-10px);background:var(--accent);color:var(--bg);padding:12px 20px;border-radius:var(--r);font-family:var(--fh);font-size:13px;font-weight:700;z-index:900;opacity:0;transition:all 0.35s;pointer-events:none;white-space:nowrap;max-width:90vw;text-align:center}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.8);display:flex;align-items:flex-end;z-index:800;opacity:0;pointer-events:none;transition:opacity 0.25s}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal-sheet{width:100%;background:var(--surface);border-radius:24px 24px 0 0;padding:24px 24px calc(32px + env(safe-area-inset-bottom,0px));transform:translateY(100%);transition:transform 0.3s cubic-bezier(0.34,1.56,0.64,1)}
.modal-overlay.open .modal-sheet{transform:translateY(0)}
.modal-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 20px}
.modal-title{font-family:var(--fh);font-size:17px;font-weight:700;margin-bottom:3px}
.modal-sub{font-size:12px;color:var(--muted);margin-bottom:22px}
.rep-picker{display:flex;align-items:center;justify-content:center;gap:28px;margin-bottom:24px}
.rep-btn{width:52px;height:52px;border-radius:50%;background:var(--surface2);border:1px solid var(--border);color:var(--text);font-size:28px;cursor:pointer;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent}
.rep-num{font-family:var(--fh);font-size:56px;font-weight:800;color:var(--accent);min-width:90px;text-align:center;line-height:1}
.modal-confirm{width:100%;padding:16px;background:var(--accent);color:var(--bg);border:none;border-radius:var(--r);font-family:var(--fh);font-size:16px;font-weight:700;cursor:pointer}
.modal-skip{width:100%;padding:12px;background:none;border:none;color:var(--muted);font-family:var(--fm);font-size:13px;cursor:pointer;margin-top:6px}

/* REST DAY */
.rest-view{padding:32px 0;text-align:center}
.rest-emoji{font-size:56px;margin-bottom:16px}
.rest-title{font-family:var(--fh);font-size:26px;font-weight:800;margin-bottom:8px}
.rest-desc{font-size:13px;color:var(--muted);line-height:1.7}
.rest-activities{margin-top:20px;display:flex;flex-direction:column;gap:8px}
.rest-act{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-sm);padding:12px 14px;font-size:13px;color:var(--muted);text-align:left}

/* HISTORY */
.hist-title{font-family:var(--fh);font-size:22px;font-weight:800;padding:18px 0 14px}
.hist-entry{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;margin-bottom:10px}
.hist-day{font-family:var(--fh);font-size:13px;font-weight:700;color:var(--accent)}
.hist-date{font-size:11px;color:var(--muted);margin-bottom:8px}
.hist-ex{font-size:12px;color:var(--text);padding:4px 0;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;gap:8px}
.hist-ex:last-child{border-bottom:none}
.hist-sets-detail{font-size:11px;color:var(--muted);text-align:right}
.empty-hist{text-align:center;color:var(--muted);font-size:14px;padding:48px 0;line-height:2}
  /* EVOLUZIONE */
#evolution-view{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0 0 100px;display:none}
#evolution-view.visible{display:block}
.evo-wrap{padding:20px 20px 0}
.evo-title{font-family:var(--fh);font-size:22px;font-weight:800;color:var(--text);margin-bottom:4px}
.evo-sub{font-size:12px;color:var(--muted);margin-bottom:20px;line-height:1.5}
.evo-progress-bar{height:6px;background:var(--surface2);border-radius:3px;overflow:hidden;margin-bottom:6px}
.evo-progress-fill{height:100%;border-radius:3px;transition:width 0.8s ease;background:linear-gradient(90deg,var(--push),var(--legs),var(--accent))}
.evo-pct{font-family:var(--fh);font-size:13px;color:var(--accent);margin-bottom:24px}
.evo-stages{display:flex;flex-direction:column;gap:12px;padding:0 20px 20px}
.evo-stage{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;display:flex;align-items:center;gap:14px;transition:all 0.3s}
.evo-stage.unlocked{border-color:rgba(200,245,90,0.3);background:rgba(200,245,90,0.04)}
.evo-stage.current{border-color:var(--accent);background:rgba(200,245,90,0.08);box-shadow:0 0 12px rgba(200,245,90,0.1)}
.evo-stage.locked{opacity:0.4}
.evo-figure{font-size:36px;flex-shrink:0;filter:grayscale(1);transition:filter 0.3s}
.evo-stage.unlocked .evo-figure{filter:grayscale(0)}
.evo-stage.current .evo-figure{filter:grayscale(0)}
.evo-info{flex:1}
.evo-stage-name{font-family:var(--fh);font-size:14px;font-weight:700;color:var(--muted);margin-bottom:3px}
.evo-stage.unlocked .evo-stage-name{color:var(--text)}
.evo-stage.current .evo-stage-name{color:var(--accent)}
.evo-stage-desc{font-size:11px;color:var(--muted);line-height:1.5}
.evo-stage-req{font-size:10px;color:var(--muted);margin-top:4px;font-family:var(--fh)}
.evo-stage.current .evo-stage-req{color:var(--accent)}
.evo-badge{font-size:10px;padding:2px 8px;border-radius:10px;font-family:var(--fh);font-weight:700;flex-shrink:0}
.evo-badge.done{background:rgba(200,245,90,0.15);color:var(--accent)}
.evo-badge.now{background:var(--accent);color:var(--bg)}
.evo-badge.locked{background:var(--surface2);color:var(--muted)}
  /* CALENDARIO */
.cal-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px 10px;flex-shrink:0}
.cal-month{font-family:var(--fh);font-size:20px;font-weight:800;color:var(--text)}
.cal-nav{background:none;border:1px solid var(--border);border-radius:var(--r-sm);color:var(--muted);font-size:18px;width:36px;height:36px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.cal-grid-wrap{padding:0 16px;flex-shrink:0}
.cal-dow{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:4px}
.cal-dow-cell{text-align:center;font-size:10px;color:var(--muted);font-family:var(--fh);padding:4px 0}
.cal-days{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.cal-day{aspect-ratio:1;border-radius:var(--r-sm);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;position:relative;border:1px solid transparent;transition:all 0.15s}
.cal-day.empty{cursor:default}
.cal-day.today{border-color:var(--accent)}
.cal-day.selected{background:var(--surface2)}
.cal-day-num{font-size:12px;font-family:var(--fh);font-weight:600;color:var(--muted)}
.cal-day.today .cal-day-num{color:var(--accent)}
.cal-day.has-data .cal-day-num{color:var(--text)}
.cal-dot{width:6px;height:6px;border-radius:50%}
.cal-detail-wrap{padding:12px 16px 100px;overflow-y:auto}
.cal-detail-date{font-family:var(--fh);font-size:16px;font-weight:700;color:var(--accent);margin-bottom:12px}
.cal-detail-ex{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;margin-bottom:8px}
.cal-detail-name{font-family:var(--fh);font-size:13px;font-weight:700;color:var(--text);margin-bottom:4px}
.cal-detail-sets{font-size:12px;color:var(--muted)}
.cal-empty-day{text-align:center;color:var(--muted);font-size:13px;padding:24px 0}
  /* ESERCIZI SUGGERITI */
.suggested-list{display:flex;flex-direction:column;gap:8px;margin-bottom:10px}
.suggested-ex{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;cursor:pointer;transition:all 0.2s}
.suggested-ex.selected{border-color:var(--accent);background:rgba(200,245,90,0.06)}
.suggested-ex-header{display:flex;align-items:center;justify-content:space-between;gap:10px}
.suggested-ex-name{font-family:var(--fh);font-size:13px;font-weight:700;color:var(--text)}
.suggested-ex.selected .suggested-ex-name{color:var(--accent)}
.suggested-ex-meta{font-size:11px;color:var(--muted);margin-top:3px}
.suggested-ex-tag{font-size:9px;padding:2px 8px;border-radius:10px;font-family:var(--fh);font-weight:700;flex-shrink:0}
.tag-push{background:rgba(245,90,140,0.15);color:var(--push)}
.tag-pull{background:rgba(90,245,200,0.15);color:var(--pull)}
.tag-core{background:rgba(90,140,245,0.15);color:var(--core)}
.tag-mob{background:rgba(245,200,90,0.15);color:var(--legs)}
.suggested-ex-detail{display:none;margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}
.suggested-ex.selected .suggested-ex-detail{display:block}
.suggested-ex-steps{list-style:none;margin:6px 0 10px}
.suggested-ex-steps li{font-size:12px;color:var(--muted);padding:4px 0;border-bottom:1px solid var(--border);display:flex;gap:8px}
.suggested-ex-steps li:last-child{border-bottom:none}
.suggested-add-btn{width:100%;padding:11px;background:var(--accent);border:none;border-radius:var(--r-sm);color:var(--bg);font-family:var(--fh);font-size:13px;font-weight:700;cursor:pointer;margin-top:6px}
.suggest-toggle-btn{width:100%;padding:13px;background:none;border:1px solid rgba(90,140,245,0.3);border-radius:var(--r);color:var(--core);font-family:var(--fm);font-size:13px;cursor:pointer;margin-bottom:8px;display:flex;align-items:center;justify-content:center;gap:8px}
  /* TIMER */
.timer-bar{background:var(--surface2);border-radius:0 0 var(--r) var(--r);padding:10px 14px;border-top:1px solid var(--border)}
.timer-display{display:flex;align-items:center;justify-content:space-between;gap:10px}
.timer-countdown{font-family:var(--fh);font-size:28px;font-weight:800;color:var(--accent);min-width:60px}
.timer-countdown.warning{color:var(--legs)}
.timer-countdown.urgent{color:var(--push)}
.timer-label{font-size:10px;color:var(--muted);letter-spacing:1.5px;font-family:var(--fh)}
.timer-track{height:3px;background:var(--border);border-radius:2px;margin-top:6px;overflow:hidden}
.timer-fill{height:100%;background:var(--accent);border-radius:2px;transition:width 0.9s linear}
.timer-fill.warning{background:var(--legs)}
.timer-fill.urgent{background:var(--push)}

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();
const provider = new firebase.auth.GoogleAuthProvider();
let currentUser = null;

async function saveStateToFirestore(){
  if(!currentUser) return;
  try{ await db.collection('users').doc(currentUser.uid).set({data:state}); }
  catch(e){ console.error('Errore salvataggio:',e); }
}

async function loadStateFromFirestore(){
  if(!currentUser) return;
  try{
    const local = localStorage.getItem('caliAM_v3');
    let localState = local ? JSON.parse(local) : null;
    const snap = await db.collection('users').doc(currentUser.uid).get();
    if(snap.exists){
      const firebaseState = snap.data().data || {};
      if(localState && Object.keys(localState).length > Object.keys(firebaseState).length){
        state = localState; await saveStateToFirestore();
      } else { state = firebaseState; }
    } else {
      if(localState){ state=localState; await saveStateToFirestore(); }
    }
    migrateStateToV2();
  }catch(e){ console.error('Errore caricamento:',e); }
}

async function loginGoogle(){ try{ await auth.signInWithPopup(provider); }catch(e){ console.error('Errore login:',e); } }
async function logoutGoogle(){ await auth.signOut(); state={}; renderAll(); }

auth.onAuthStateChanged(async(user)=>{
  currentUser=user;
  if(user){
    document.getElementById('login-screen').style.display='none';
    document.getElementById('app').style.display='flex';
    await loadStateFromFirestore();
    applyPendingLevels();
    currentDay=getTodayIdx();
    updateDate();
    renderAll();
  } else {
    document.getElementById('login-screen').style.display='flex';
    document.getElementById('app').style.display='none';
  }
});

    amrap:{0:{p:0,l:0},1:{p:0,l:1},2:{p:1,l:0}}
  };
  Object.keys(map).forEach(chain => {
    const oldLv = state['lv_' + chain];
    if(oldLv !== undefined && map[chain][oldLv]){
      state['phase_' + chain] = map[chain][oldLv].p;
      state['lv_' + chain] = map[chain][oldLv].l;
    }
    const pending = state['pending_lv_' + chain];

  });
  state._migrated_v2 = true;
  saveState();

// ─── STATE & STORAGE ────────────────────────────────────────
const CONSEC_NEEDED=3;
let state={}, currentDay=0, modalCtx=null, currentRep=10;
function loadState(){ try{state=JSON.parse(localStorage.getItem('caliAM_v3')||'{}');}catch(e){state={};} }
function saveState(){ localStorage.setItem('caliAM_v3',JSON.stringify(state)); saveStateToFirestore(); }
function getChainState(chain){ return {phase:state['phase_'+chain]||0, level:state['lv_'+chain]||0}; }
function setChainState(chain,phase,level){ state['phase_'+chain]=phase; state['lv_'+chain]=level; saveState(); }
function getLevel(chain){ return getChainState(chain).level; }
function getConsec(chain){ return state['con_'+chain]||0; }
function setConsec(chain,n){ state['con_'+chain]=n; saveState(); }
function getExDef(chain){
  const cd=CHAINS[chain]; if(!cd||!cd.phases) return null;
  const {phase,level}=getChainState(chain);
  const sp=Math.min(phase,cd.phases.length-1);
  const sl=Math.min(level,cd.phases[sp].levels.length-1);
  const ex=cd.phases[sp].levels[sl];
  return {...ex, phaseName:cd.phases[sp].name, isLastInPhase:sl===cd.phases[sp].levels.length-1, isLastInChain:sp===cd.phases.length-1&&sl===cd.phases[sp].levels.length-1};
}
function todayStr(){ return new Date().toISOString().slice(0,10); }
function setKey(di,ci,si){ return todayStr()+'_d'+di+'_c'+ci+'_s'+si; }
function getTodayIdx(){ return [6,0,1,2,3,4,5][new Date().getDay()]; }

function markChainConsec(chain,dayIdx,chainIdx){
  const cd=CHAINS[chain]; if(!cd||!cd.phases) return false;
  const {phase,level}=getChainState(chain);
  const ex=getExDef(chain); const nSets=ex.sets;
  const allDone=Array.from({length:nSets},(_,s)=>state[setKey(dayIdx,chainIdx,s)]).every(Boolean);
  if(!allDone) return false;
  const newCon=getConsec(chain)+1; setConsec(chain,newCon);
  if(newCon>=CONSEC_NEEDED){
    if(ex.isLastInPhase&&!ex.isLastInChain){ state['pending_phase_up_'+chain]={nextPhase:phase+1,date:todayStr()}; saveState(); return 'PHASE_UP'; }
    else if(!ex.isLastInChain){ state['pending_lv_'+chain]={lv:level+1,date:todayStr()}; saveState(); return 'LEVEL_UP'; }
  }
  return false;
}
function applyPendingLevels(){
  const today=todayStr();
  Object.keys(state).forEach(k=>{
    if(k.startsWith('pending_lv_')){ const chain=k.replace('pending_lv_',''); const p=state[k]; if(p&&p.date!==today){ const {phase}=getChainState(chain); setChainState(chain,phase,p.lv); setConsec(chain,0); delete state[k]; saveState(); } }
    if(k.startsWith('pending_phase_up_')){ const chain=k.replace('pending_phase_up_',''); const p=state[k]; if(p&&p.date!==today){ setChainState(chain,p.nextPhase,0); setConsec(chain,0); delete state[k]; saveState(); const cd=CHAINS[chain]; if(cd&&cd.phases[p.nextPhase]) showToast(`🔥 FASE ${p.nextPhase+1} SBLOCCATA: ${cd.phases[p.nextPhase].name}!`); } }
  });
}

function renderDay(){
  const area=document.getElementById('scroll-area'); const day=DAYS[currentDay];
  if(day.type==='rest'||day.type==='rest-full'){ area.innerHTML=`<div class="rest-view"><div class="rest-emoji">${day.type==='rest-full'?'🛌':'🌿'}</div><div class="rest-title">${day.name}</div><div class="rest-desc">${day.restTip}</div>${day.restActivities?`<div class="rest-activities">${day.restActivities.map(a=>`<div class="rest-act">${a}</div>`).join('')}</div>`:''}</div>`; return; }

  let done=0; day.exercises.forEach((ex,ci)=>{ const n=(getExDef(ex.chain)||{sets:0}).sets; for(let s=0;s<n;s++){if(state[setKey(currentDay,ci,s)])done++;} });
  const pct=total?Math.round(done/total*100):0;
  const typeLabel={push:'SPINTA',pull:'TIRATA',legs:'GAMBE',core:'CORE',full:'FULL BODY'}[day.type]||'';
  let html=`<div class="day-header"><div class="day-name">${day.name}</div><div class="day-meta"><span class="focus-badge" style="background:${day.color}22;color:${day.color}">${typeLabel}</span><span style="font-size:11px;color:var(--muted)">${done}/${total} serie · ${pct}%</span></div><div class="day-progress"><div class="day-progress-fill" style="width:${pct}%"></div></div></div><div class="phase-card"><div class="phase-label">🔥 RISCALDAMENTO — ${day.warmup[0].text}</div>${day.warmup.slice(1).map(it=>`<div class="phase-row"><span class="phase-icon">${it.icon}</span><div><div class="phase-text">${it.text}</div>${it.note?`<div class="phase-note">${it.note}</div>`:''}</div></div>`).join('')}</div><div class="rest-chip">⏱ ${day.restNote.replace(' ','')}</div>`;
  day.exercises.forEach((exRef,ci)=>{
    const chain=exRef.chain; const ex=getExDef(chain); if(!ex) return;
    const cd=CHAINS[chain]; const {phase,level}=getChainState(chain); const consec=getConsec(chain);
    const nSets=ex.sets; const allDone=Array.from({length:nSets},(_,s)=>state[setKey(currentDay,ci,s)]).every(Boolean);
    const progSegs=cd.phases[phase].levels.map((_,i)=>`<div class="prog-seg ${i<level?'seg-done':i===level?'seg-current':'seg-future'}"></div>`).join('');
    const dots=Array.from({length:CONSEC_NEEDED},(_,i)=>`<div class="cdot${i<consec?' filled':''}"></div>`).join('');
    let setsHtml=''; for(let s=0;s<nSets;s++){ const k=setKey(currentDay,ci,s); const val=state[k]; const lbl=val!=null?(ex.iso?val+'s':val+'×'):(ex.iso?'sec':'rip'); setsHtml+=`<div class="set-btn ${val!=null?'set-done':''}" onclick="event.stopPropagation();openModal(${currentDay},${ci},${s})"><span class="set-lbl">S${s+1}</span><span>${lbl}</span></div>`; }
    let phaseBox='';
    if(ex.isLastInPhase&&!ex.isLastInChain) phaseBox=`<div class="next-box" style="border-color:var(--accent3);background:rgba(245,90,140,0.05)"><div class="next-label" style="color:var(--accent3)">🔒 PROSSIMA FASE: ${cd.phases[phase+1].name}</div><div class="next-name" style="color:var(--text)">Requisito: ${cd.phases[phase].unlockReq}</div><div class="next-sub">Completa ${CONSEC_NEEDED-consec} allenamenti consecutivi.</div></div>`;
    else if(ex.isLastInChain) phaseBox=`<div class="next-box"><div class="next-label">👑 MAESTRIA RAGGIUNTA</div><div class="next-name">Tutte le fasi completate!</div><div class="next-sub">Mantieni o aggiungi sovraccarico.</div></div>`;
    else { const nextEx=cd.phases[phase].levels[level+1]; phaseBox=`<div class="next-box"><div class="next-label">PROSSIMA VARIANTE</div><div class="next-name">→ ${nextEx.name}</div><div class="next-sub">Mancano ${CONSEC_NEEDED-consec} allenamenti</div></div>`; }
    html+=`<div class="ex-card ${allDone?'done-card':''}" id="exc-${ci}"><div class="ex-header" onclick="toggleEx(${ci})"><div class="ex-num">${allDone?'✓':(ci+1)}</div><div class="ex-main"><div class="ex-name">${ex.name}</div><div class="ex-sets-line">${ex.sets_label} · ${ex.rest}</div><div class="ex-level-row"><span class="lv-badge ${lvClass(phase)}">FASE ${phase+1} · LV ${level+1}</span><div class="consec-dots">${dots}</div><span style="font-size:9px;color:var(--muted)">${consec}/${CONSEC_NEEDED}</span></div></div><div class="ex-chevron">▾</div></div><div class="ex-detail" id="exd-${ci}"><div class="ex-detail-inner"><span class="muscles-tag">${ex.phaseName}</span> <span class="muscles-tag">${ex.muscles}</span><br><a class="video-btn" href="https://www.youtube.com/results?search_query=${encodeURIComponent(ex.ytq)}" target="_blank"><div class="play-icon"><svg viewBox="0 0 10 12"><polygon points="0,0 10,6 0,12"/></svg></div>Guarda il video su YouTube</a><div class="ex-tip">${ex.tip}</div><ul class="ex-steps">${ex.steps.map((s,i)=>`<li><span class="step-n">${i+1}</span><span>${s}</span></li>`).join('')}</ul>${phaseBox}</div><div class="log-section"><div class="log-label">REGISTRA LE SERIE</div><div class="log-sets">${setsHtml}</div>${ex.iso?`<button class="iso-start-btn" onclick="event.stopPropagation();startIsoTimer(${currentDay},${ci})">▶ Avvia timer</button>`:''}${ex.amrap?`<button class="iso-start-btn" onclick="event.stopPropagation();startAmrapTimer(${currentDay},${ci})" style="background:rgba(245,90,140,0.1);border-color:rgba(245,90,140,0.3);color:var(--push)">▶ Avvia AMRAP ${ex.amrapMins} min</button>`:''}</div><div id="timer-${ci}"></div></div></div>`;
  });
  html+=`<div class="phase-card" style="margin-top:10px"><div class="phase-label">❄️ DEFATICAMENTO</div>${day.cooldown.map(it=>`<div class="phase-row"><span class="phase-icon">${it.icon}</span><div><div class="phase-text">${it.text}</div>${it.note?`<div class="phase-note">${it.note}</div>`:''}</div></div>`).join('')}</div><div style="margin-top:10px">${renderExtras(currentDay)}<button class="suggest-toggle-btn" onclick="toggleSuggestPanel(${currentDay})">💡 Scegli esercizio suggerito</button><div id="suggest-panel-${currentDay}"></div><button onclick="openExtraModal(${currentDay})" style="width:100%;padding:13px;background:none;border:1px dashed var(--border);border-radius:var(--r);color:var(--muted);font-family:var(--fm);font-size:13px;cursor:pointer;margin-top:8px">＋ Aggiungi esercizio libero</button></div>`;
  area.innerHTML=html;
  if(pct===100){ const dk='done_'+todayStr()+'_'+currentDay; if(!state[dk]){state[dk]=new Date().toISOString();saveState();} }
}

function confirmRep(){
  if(!modalCtx) return; const {di,ci,si,chain}=modalCtx;
  state[setKey(di,ci,si)]=currentRep;
  if(!state[todayStr()+'_d'+di+'_c'+ci+'_name']) state[todayStr()+'_d'+di+'_c'+ci+'_name']=getExDef(chain).name;

function showMain(){ document.getElementById('main-view').classList.remove('hidden'); document.getElementById('history-view').classList.remove('visible'); document.getElementById('evolution-view').classList.remove('visible'); document.getElementById('nav-today').classList.add('active'); document.getElementById('nav-hist').classList.remove('active'); document.getElementById('nav-evo').classList.remove('active'); calSelected=null; }
function renderCalendar(){ renderCalHeader(); renderCalGrid(); if(calSelected) renderCalDetail(calSelected); else document.getElementById('cal-detail').innerHTML=''; }
function renderCalHeader(){ const m=['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno','Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre']; document.getElementById('cal-header').innerHTML=`<div class="cal-header"><button class="cal-nav" onclick="calPrev()">‹</button><div class="cal-month">${m[calMonth]} ${calYear}</div><button class="cal-nav" onclick="calNext()">›</button></div>`; }
function calPrev(){ calMonth--; if(calMonth<0){calMonth=11;calYear--;} calSelected=null; renderCalendar(); }
function calNext(){ calMonth++; if(calMonth>11){calMonth=0;calYear++;} calSelected=null; renderCalendar(); }
function getDateStr(y,m,d){ return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`; }
function getDayData(ds){ const t=[]; DAYS.slice(0,5).forEach((_,di)=>{if(state['done_'+ds+'_'+di])t.push(di);}); return t; }
function getDayColor(di){ return {0:'var(--push)',1:'var(--legs)',2:'var(--core)',3:'var(--pull)',4:'var(--full)'}[di]||'var(--accent)'; }
function renderCalGrid(){
  const today=new Date(); const fd=new Date(calYear,calMonth,1).getDay(); const dim=new Date(calYear,calMonth+1,0).getDate(); const so=(fd+6)%7; const dows=['L','M','M','G','V','S','D'];
  let html=`<div class="cal-grid-wrap"><div class="cal-dow">${dows.map(d=>`<div class="cal-dow-cell">${d}</div>`).join('')}</div><div class="cal-days">`;
  for(let i=0;i<so;i++) html+=`<div class="cal-day empty"></div>`;
  for(let d=1;d<=dim;d++){ const ds=getDateStr(calYear,calMonth,d); const tr=getDayData(ds); const isT=today.getFullYear()===calYear&&today.getMonth()===calMonth&&today.getDate()===d; const isS=calSelected===ds; const hD=tr.length>0; const hE=Object.keys(state).some(k=>k.startsWith('extras_'+ds+'_')); const dots=tr.map(di=>`<div class="cal-dot" style="background:${getDayColor(di)}"></div>`).join(''); const eD=hE&&!hD?`<div class="cal-dot" style="background:var(--accent);opacity:0.5"></div>`:''; html+=`<div class="cal-day ${hD||hE?'has-data':''} ${isT?'today':''} ${isS?'selected':''}" onclick="selectDay('${ds}')"><div class="cal-day-num">${d}</div><div style="display:flex;gap:2px;flex-wrap:wrap;justify-content:center">${dots}${eD}</div></div>`; }
  html+=`</div></div>`; document.getElementById('cal-grid').innerHTML=html;
}
function selectDay(ds){ calSelected=calSelected===ds?null:ds; renderCalGrid(); renderCalDetail(ds); }
function renderCalDetail(ds){
  const el=document.getElementById('cal-detail'); if(!calSelected){el.innerHTML='';return;}
  const tr=getDayData(ds); const df=new Date(ds+'T12:00:00').toLocaleDateString('it-IT',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  let html=`<div class="cal-detail-wrap"><div class="cal-detail-date">📅 ${df}</div>`;
  if(!tr.length&&!Object.keys(state).some(k=>k.startsWith('extras_'+ds+'_'))) html+=`<div class="cal-empty-day">Nessun allenamento</div>`;
  tr.forEach(di=>{ const day=DAYS[di]; if(!day||!day.exercises) return; const tl={push:'SPINTA 💪',pull:'TIRATA 🏋️',legs:'GAMBE 🦵',core:'CORE 🧘',full:'FULL BODY ⚡'}[day.type]||''; html+=`<div style="font-size:10px;color:${getDayColor(di)};font-family:var(--fh);font-weight:700;letter-spacing:1px;margin:8px 0 6px">${day.name} — ${tl}</div>`; day.exercises.forEach((exRef,ci)=>{ const ex=getExDef(exRef.chain); if(!ex) return; const sn=state[ds+'_d'+di+'_c'+ci+'_name']||ex.name; const si=state[ds+'_d'+di+'_c'+ci+'_iso']!==undefined?state[ds+'_d'+di+'_c'+ci+'_iso']:ex.iso; const sets=[]; for(let s=0;s<(ex.sets||3)+3;s++){const v=state[ds+'_d'+di+'_c'+ci+'_s'+s];if(v!=null)sets.push(v);} if(!sets.length) return; html+=`<div class="cal-detail-ex"><div class="cal-detail-name">${sn}</div><div class="cal-detail-sets">${sets.map((v,i)=>'S'+(i+1)+': '+v+(si?'s':'×')).join(' · ')}</div></div>`; }); const extras=state['extras_'+ds+'_d'+di]||[]; extras.forEach(ex=>{html+=`<div class="cal-detail-ex" style="border-color:rgba(200,245,90,0.2)"><div class="cal-detail-name" style="color:var(--accent)">⭐ ${ex.name}</div><div class="cal-detail-sets">${ex.sets.map((v,s)=>'S'+(s+1)+': '+v+(ex.iso?'s':'×')).join(' · ')}</div></div>`;}); });
  html+=`</div>`; el.innerHTML=html;
}

function renderExtras(di){ const key='extras_'+todayStr()+'_d'+di; const extras=state[key]||[]; if(!extras.length) return ''; return extras.map((ex,i)=>`<div style="background:var(--surface);border:1px solid rgba(200,245,90,0.2);border-radius:var(--r);padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;gap:10px"><div style="flex:1"><div style="font-family:var(--fh);font-size:13px;font-weight:700;color:var(--accent);margin-bottom:4px">⭐ ${ex.name}</div><div style="font-size:12px;color:var(--muted)">${ex.sets.map((r,s)=>'S'+(s+1)+': '+r+(ex.iso?'s':'×')).join(' · ')}</div></div><button onclick="deleteExtra(${di},${i})" style="background:none;border:1px solid rgba(245,90,140,0.3);border-radius:var(--r-sm);color:var(--push);font-size:11px;padding:4px 8px;cursor:pointer">✕</button></div>`).join(''); }
function deleteExtra(di,idx){ const key='extras_'+todayStr()+'_d'+di; if(!state[key]) return; state[key].splice(idx,1); saveState(); renderAll(); }
function openExtraModal(di){ const name=prompt('Nome esercizio:'); if(!name||!name.trim()) return; const setsN=parseInt(prompt('Quante serie?')||'1'); if(!setsN||setsN<1) return; const iso=confirm('Isometrico? OK=sì'); const sets=[]; for(let s=0;s<setsN;s++){sets.push(parseInt(prompt(`Serie ${s+1}:`))||0);} const key='extras_'+todayStr()+'_d'+di; if(!state[key]) state[key]=[]; state[key].push({name:name.trim(),sets,iso}); saveState(); renderAll(); }

let timerInterval=null, timerState=null, wakeLock=null;
async function requestWakeLock(){ try{if('wakeLock' in navigator) wakeLock=await navigator.wakeLock.request('screen');}catch(e){} }
function releaseWakeLock(){ if(wakeLock){wakeLock.release();wakeLock=null;} }
function beep(freq=880,dur=150,vol=0.3){ try{const ctx=new(window.AudioContext||window.webkitAudioContext)();const o=ctx.createOscillator();const g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.frequency.value=freq;g.gain.setValueAtTime(vol,ctx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+dur/1000);o.start(ctx.currentTime);o.stop(ctx.currentTime+dur/1000);}catch(e){} }
function vibrateAndBeep(){ if(navigator.vibrate) navigator.vibrate([100,50,100]); beep(880,200,0.3); }
function getRestSeconds(chain){ const ex=getExDef(chain); if(!ex) return 90; const r=ex.rest||''; if(r.includes('3 min')) return 180; if(r.includes('2 min')) return 120; if(r.includes('90')) return 90; if(r.includes('60')) return 60; return 90; }
function startIsoTimer(di,ci){ const ex=getExDef(DAYS[di].exercises[ci].chain); startPreCounter(ex.reps||30,ci,ex.sides||1); }
function startAmrapTimer(di,ci){ const ex=getExDef(DAYS[di].exercises[ci].chain); startAmrapPreCounter((ex.amrapMins||5)*60,ci); }
function startAmrapPreCounter(ts,id){ clearTimer(); requestWakeLock(); let c=3; timerState={type:'amrap-pre',total:3,remaining:c,exCardId:id,totalSecs:ts}; renderTimerInCard(id); beep(440,100,0.2); timerInterval=setInterval(()=>{c--;if(c<=0){clearInterval(timerInterval);timerInterval=null;beep(660,200,0.4);startAmrapExecTimer(ts,id);}else{timerState.remaining=c;beep(440,100,0.2);renderTimerInCard(id);}},1000); }
function startAmrapExecTimer(ts,id){ timerState={type:'amrap',total:ts,remaining:ts,exCardId:id}; renderTimerInCard(id); timerInterval=setInterval(()=>{timerState.remaining--;if(timerState.remaining<=0){clearInterval(timerInterval);timerInterval=null;vibrateAndBeep();setTimeout(()=>beep(880,300,0.4),300);setTimeout(()=>beep(880,300,0.4),700);timerState=null;releaseWakeLock();renderTimerInCard(id);showToast(' AMRAP terminato!');}else{if(timerState.remaining===10)beep(440,100,0.15);if(timerState.remaining<=5)beep(440,100,0.2);renderTimerInCard(id);}},1000); }
function startPreCounter(ts,id,sr=1,cs=1){ clearTimer(); requestWakeLock(); let c=3; timerState={type:'pre',total:3,remaining:c,exCardId:id,targetSecs:ts,sides:sr,currentSide:cs}; renderTimerInCard(id); beep(440,100,0.2); timerInterval=setInterval(()=>{c--;if(c<=0){clearInterval(timerInterval);timerInterval=null;beep(660,150,0.3);startExecTimer(ts,id,sr,cs);}else{timerState.remaining=c;beep(440,100,0.2);renderTimerInCard(id);}},1000); }
function startExecTimer(ts,id,s=1,cs=1){ let e=0,b=false; timerState={type:'exec',total:ts,elapsed:0,exCardId:id,targetSecs:ts,sides:s,currentSide:cs}; renderTimerInCard(id); timerInterval=setInterval(()=>{e++;timerState.elapsed=e;if(e===ts&&!b){b=true;vibrateAndBeep();setTimeout(()=>beep(880,150,0.3),250);if(cs<s)setTimeout(()=>{clearInterval(timerInterval);timerInterval=null;startPreCounter(ts,id,s-cs,cs+1);},1500);}renderTimerInCard(id);},1000); }
function startTimer(type,sec,id){ clearTimer(); requestWakeLock(); timerState={type,total:sec,remaining:sec,exCardId:id}; renderTimerInCard(id); timerInterval=setInterval(()=>{timerState.remaining--;if(timerState.remaining<=0){clearInterval(timerInterval);timerInterval=null;vibrateAndBeep();timerState=null;releaseWakeLock();renderTimerInCard(id);}else{if(timerState.remaining===3)beep(440,100,0.15);renderTimerInCard(id);}},1000); }
function clearTimer(){ if(timerInterval){clearInterval(timerInterval);timerInterval=null;} timerState=null; releaseWakeLock(); }
function stopIsoTimer(ci){ if(!timerState||timerState.type!=='exec') return; const e=timerState.elapsed||0; clearTimer(); const chain=DAYS[currentDay].exercises[ci].chain; const ex=getExDef(chain); modalCtx={di:currentDay,ci,si:findNextSet(currentDay,ci),chain}; currentRep=e; document.getElementById('modal-title').textContent=ex.name+' — Serie '+(modalCtx.si+1); document.getElementById('modal-sub').textContent='Secondi tenuti:'; document.getElementById('rep-num').textContent=currentRep; document.getElementById('modal').classList.add('open'); }
function findNextSet(di,ci){ const ex=getExDef(DAYS[di].exercises[ci].chain); for(let s=0;s<(ex.sets||3);s++){if(!state[setKey(di,ci,s)])return s;} return (ex.sets||3)-1; }
function renderTimerInCard(id){
  const el=document.getElementById('timer-'+id); if(!el) return; if(!timerState||timerState.exCardId!==id){el.innerHTML='';return;}
  const {type}=timerState;
  if(type==='pre'){const{remaining,currentSide,sides}=timerState;const sl=sides>1?` — LATO ${currentSide}`:'';el.innerHTML=`<div class="timer-bar" style="text-align:center"><div class="timer-label">PREPARATI${sl}</div><div class="timer-countdown" style="font-size:42px;text-align:center;padding:8px 0">${remaining}</div></div>`;return;}
  if(type==='exec'){const{elapsed,targetSecs,currentSide,sides}=timerState;const ot=elapsed>=targetSecs;const bp=Math.min(Math.round(elapsed/targetSecs*100),100);const sl=sides>1?` — LATO ${currentSide}`:'';el.innerHTML=`<div class="timer-bar"><div class="timer-label">${ot?'🔥 OLTRE TARGET!':'TIENI LA POSIZIONE'+sl}</div><div class="timer-display"><div class="timer-countdown ${ot?'urgent':''}">${elapsed}"</div><div style="font-size:11px;color:var(--muted)">target: ${targetSecs}"</div></div><div class="timer-track"><div class="timer-fill ${ot?'urgent':''}" style="width:${bp}%;${ot?'background:var(--push)':'background:var(--core)'}"></div></div><button onclick="event.stopPropagation();stopIsoTimer(${id})" style="width:100%;margin-top:8px;padding:10px;background:rgba(200,245,90,0.1);border:1px solid rgba(200,245,90,0.3);border-radius:var(--r-sm);color:var(--accent);font-family:var(--fh);font-size:13px;font-weight:700;cursor:pointer">⏹ Stop e registra ${elapsed}"</button></div>`;return;}
  if(type==='amrap-pre'){el.innerHTML=`<div class="timer-bar" style="text-align:center"><div class="timer-label">PREPARATI — AMRAP</div><div class="timer-countdown" style="font-size:42px;text-align:center;padding:8px 0">${timerState.remaining}</div></div>`;return;}
  if(type==='amrap'){const{total,remaining}=timerState;const p=Math.round(remaining/total*100);const m=Math.floor(remaining/60);const s=remaining%60;const d=m>0?`${m}:${s.toString().padStart(2,'0')}`:`${remaining}`;const uc=remaining<=10?'urgent':remaining<=30?'warning':'';el.innerHTML=`<div class="timer-bar"><div class="timer-label">🏃 AMRAP IN CORSO</div><div class="timer-display"><div class="timer-countdown ${uc}">${d}</div><div style="font-size:11px;color:var(--muted)">vai!</div></div><div class="timer-track"><div class="timer-fill ${uc}" style="width:${p}%"></div></div></div>`;return;}
  const{total,remaining}=timerState;const p=Math.round(remaining/total*100);const m=Math.floor(remaining/60);const s=remaining%60;const d=m>0?`${m}:${s.toString().padStart(2,'0')}`:`${remaining}`;const uc=remaining<=5?'urgent':remaining<=10?'warning':'';el.innerHTML=`<div class="timer-bar"><div class="timer-label">RIPOSO</div><div class="timer-display"><div class="timer-countdown ${uc}">${d}"</div><div style="font-size:11px;color:var(--muted)">poi riparte</div></div><div class="timer-track"><div class="timer-fill ${uc}" style="width:${p}%"></div></div></div>`;
}

function adminSet(key,value){const s=JSON.parse(localStorage.getItem('caliAM_v3')||'{}');s[key]=value;localStorage.setItem('caliAM_v3',JSON.stringify(s));renderAll();alert('Fatto! '+key+' = '+value);}

const EVO_STAGES=[
  {id:0,emoji:'🛋️',name:'Il Divano',desc:'Punto di partenza.',req:'Inizia',weeksMin:0,levelsMin:0},
  {id:1,emoji:'',name:'Il Risveglio',desc:'Le articolazioni si svegliano.',req:'2 settimane',weeksMin:2,levelsMin:3},
  {id:2,emoji:'🏃',name:'Il Principiante',desc:'Il corpo si adatta.',req:'4 settimane',weeksMin:4,levelsMin:8},
  {id:3,emoji:'💪',name:'Il Costruttore',desc:'I muscoli rispondono.',req:'7 settimane',weeksMin:7,levelsMin:16},
  {id:4,emoji:'🧗',name:"L'Atleta in Formazione",desc:'Skill base solide.',req:'10 settimane',weeksMin:10,levelsMin:25},
  {id:5,emoji:'🤸',name:'Il Calisteta',desc:'Varianti avanzate.',req:'14 settimane',weeksMin:14,levelsMin:35},
  {id:6,emoji:'🏋️',name:"L'Atleta",desc:'Equilibrio totale.',req:'20 settimane',weeksMin:20,levelsMin:50},
  {id:7,emoji:'⚡',name:'Il Guerriero',desc:'Skill avanzate.',req:'28 settimane',weeksMin:28,levelsMin:65},
  {id:8,emoji:'',name:'Il Maestro',desc:'Stile di vita.',req:'40 settimane',weeksMin:40,levelsMin:80},
  {id:9,emoji:'🤙',name:'Zero2Hero',desc:'Controllo totale.',req:'52 settimane',weeksMin:52,levelsMin:100}
];
function getTotalLevelsUnlocked(){ let t=0; Object.keys(CHAINS).forEach(c=>{t+=getLevel(c);}); return t; }
function getWeeksActive(){ const w=new Set(); Object.keys(state).forEach(k=>{if(k.startsWith('done_')){const ds=k.replace('done_','').split('_')[0];if(ds){const d=new Date(ds);const sy=new Date(d.getFullYear(),0,1);w.add(d.getFullYear()+'_'+Math.ceil(((d-sy)/864e5+sy.getDay()+1)/7));}}}); return w.size; }
function getCurrentStageIdx(w,l){ let c=0; for(let i=0;i<EVO_STAGES.length;i++){if(w>=EVO_STAGES[i].weeksMin&&l>=EVO_STAGES[i].levelsMin)c=i;} return c; }
function getEvoPercent(w,l){ const mw=EVO_STAGES[9].weeksMin;const ml=EVO_STAGES[9].levelsMin; return Math.round((Math.min(w/mw,1)*0.4+Math.min(l/ml,1)*0.6)*100); }
function showEvolution(){ document.getElementById('main-view').classList.add('hidden'); document.getElementById('history-view').classList.remove('visible'); document.getElementById('evolution-view').classList.add('visible'); document.getElementById('nav-today').classList.remove('active'); document.getElementById('nav-hist').classList.remove('active'); document.getElementById('nav-evo').classList.add('active'); renderEvolution(); }
function renderEvolution(){
  const w=getWeeksActive();const l=getTotalLevelsUnlocked();const ci=getCurrentStageIdx(w,l);const p=getEvoPercent(w,l);const cur=EVO_STAGES[ci];
  let html=`<div class="evo-wrap"><div class="evo-title">La tua evoluzione</div><div class="evo-sub">Settimane: <strong style="color:var(--accent)">${w}</strong> · Livelli: <strong style="color:var(--accent)">${l}</strong></div><div class="evo-progress-bar"><div class="evo-progress-fill" style="width:${p}%"></div></div><div class="evo-pct">${p}% · ${cur.name}</div></div><div class="evo-stages">`;
  EVO_STAGES.forEach((s,i)=>{const u=w>=s.weeksMin&&l>=s.levelsMin;const ic=i===ci;const sc=ic?'current':u?'unlocked':'locked';const b=ic?'<span class="evo-badge now">ORA</span>':u?'<span class="evo-badge done">✓</span>':'<span class="evo-badge locked">🔒</span>';html+=`<div class="evo-stage ${sc}"><div class="evo-figure">${s.emoji}</div><div class="evo-info"><div class="evo-stage-name">${s.name}</div><div class="evo-stage-desc">${s.desc}</div><div class="evo-stage-req">📍 ${s.req}</div></div>${b}</div>`;});
  html+=`</div>`; document.getElementById('evo-content').innerHTML=html;
}

function renderAll(){ renderTabs(); renderDay(); renderStreak(); }
function updateDate(){ document.getElementById('topbar-date').textContent=new Date().toLocaleDateString('it-IT',{weekday:'long',day:'numeric',month:'long'}); }
updateDate();
setTimeout(()=>{ document.getElementById('splash').classList.add('hide'); },1200);
</script>
