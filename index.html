<!DOCTYPE html>
<html lang="it">
<head>
  <link rel="icon" type="image/png" href="icona.png">
<link rel="apple-touch-icon" href="icona.png">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0f1117">
  <link rel="manifest" href="manifest.json">
<title>Zero2Hero</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0f1117;--surface:#181c26;--surface2:#1f2435;--border:rgba(255,255,255,0.07);
  --accent:#c8f55a;--accent2:#5af5c8;--accent3:#f55a8c;
  --text:#f0f0ec;--muted:#8890a8;
  --push:#f55a8c;--pull:#5af5c8;--legs:#f5c85a;--core:#5a8cf5;--full:#c8f55a;
  --r:14px;--r-sm:8px;
  --fh:'Syne',sans-serif;--fm:'DM Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{height:100%}
body{height:100%;background:var(--bg);color:var(--text);font-family:var(--fm);overflow:hidden}

/* SPLASH */
#splash{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:1000;gap:10px;transition:opacity 0.5s}
#splash .logo{font-family:var(--fh);font-size:clamp(28px,10vw,52px);font-weight:800;color:var(--accent);letter-spacing:-2px;text-align:center;padding:0 16px}
#splash .sub{font-size:clamp(9px,3vw,11px);color:var(--muted);letter-spacing:3px;text-align:center;padding:0 16px}
#splash.hide{opacity:0;pointer-events:none}

/* APP SHELL - fixed layout, scroll only inside content */
#app{position:fixed;inset:0;display:flex;flex-direction:column;overflow:hidden}

/* TOP BAR */
.topbar{flex-shrink:0;padding:14px 20px 10px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);background:var(--bg)}
.topbar-logo{font-family:var(--fh);font-size:22px;font-weight:800;color:var(--accent);letter-spacing:-1px}
.topbar-date{font-size:11px;color:var(--muted);margin-top:2px}
.topbar-streak{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--accent)}
.streak-dot{width:8px;height:8px;border-radius:50%;background:var(--accent)}

/* DAY TABS */
.day-tabs{flex-shrink:0;display:flex;gap:6px;padding:10px 20px;overflow-x:auto;scrollbar-width:none;background:var(--bg);border-bottom:1px solid var(--border)}
.day-tabs::-webkit-scrollbar{display:none}
.day-tab{flex-shrink:0;padding:6px 14px;border-radius:20px;font-size:11px;font-weight:500;font-family:var(--fh);border:1px solid var(--border);background:var(--surface);color:var(--muted);cursor:pointer;transition:all 0.2s}
.day-tab.today{border-color:var(--accent);color:var(--accent)}
.day-tab.active{background:var(--accent);color:var(--bg);border-color:var(--accent);font-weight:700}
.day-tab.done-tab{border-color:rgba(200,245,90,0.3);color:rgba(200,245,90,0.5)}

/* MAIN CONTENT AREA — THIS IS THE SCROLLABLE PART */
#main-view{flex:1;overflow:hidden;display:flex;flex-direction:column;min-height:0}
.scroll-area{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0 16px 100px}

/* HISTORY VIEW */
#history-view{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0 16px 100px;display:none}
#history-view.visible{display:block}
#main-view.hidden{display:none}

/* BOTTOM NAV */
.bottom-bar{flex-shrink:0;background:var(--bg);border-top:1px solid var(--border);padding:12px 24px env(safe-area-inset-bottom,20px);display:flex;justify-content:space-around}
.nav-btn{display:flex;flex-direction:column;align-items:center;gap:4px;background:none;border:none;color:var(--muted);font-family:var(--fm);font-size:10px;cursor:pointer;transition:color 0.2s;padding:4px 16px}
.nav-btn.active{color:var(--accent)}
.nav-icon{font-size:20px}

/* DAY HEADER */
.day-header{padding:14px 0 10px}
.day-name{font-family:var(--fh);font-size:26px;font-weight:800;letter-spacing:-1px;line-height:1}
.day-meta{display:flex;align-items:center;gap:8px;margin-top:6px;flex-wrap:wrap}
.focus-badge{padding:3px 10px;border-radius:20px;font-size:10px;font-weight:600;font-family:var(--fh);letter-spacing:1px}
.day-progress{margin-top:10px;height:3px;background:var(--surface2);border-radius:2px;overflow:hidden}
.day-progress-fill{height:100%;background:var(--accent);border-radius:2px;transition:width 0.4s}

/* PHASE CARDS (warmup/cooldown/rest) */
.phase-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;margin-bottom:10px}
.phase-label{font-size:9px;color:var(--muted);letter-spacing:2px;font-family:var(--fh);font-weight:600;margin-bottom:6px}
.phase-row{display:flex;align-items:flex-start;gap:10px;margin-bottom:6px}
.phase-row:last-child{margin-bottom:0}
.phase-icon{font-size:14px;flex-shrink:0;margin-top:1px}
.phase-text{font-size:12px;color:var(--text);line-height:1.5}
.phase-note{font-size:11px;color:var(--muted);line-height:1.5;margin-top:2px}
.rest-chip{display:inline-flex;align-items:center;gap:5px;background:rgba(200,245,90,0.1);border:1px solid rgba(200,245,90,0.2);border-radius:20px;padding:3px 10px;font-size:11px;color:var(--accent);margin:8px 0 4px}

/* EXERCISE CARD */
.ex-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);margin-bottom:10px;overflow:hidden;transition:border-color 0.2s}
.ex-card.done-card{border-color:rgba(200,245,90,0.3);background:rgba(200,245,90,0.03)}
.ex-header{padding:12px 14px;cursor:pointer;display:flex;align-items:center;gap:10px}
.ex-num{width:30px;height:30px;border-radius:50%;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--muted);flex-shrink:0;font-family:var(--fh);font-weight:700;transition:all 0.2s}
.ex-card.done-card .ex-num{background:var(--accent);color:var(--bg);border-color:var(--accent)}
.ex-main{flex:1;min-width:0}
.ex-name{font-family:var(--fh);font-size:14px;font-weight:700}
.ex-sets-line{font-size:12px;color:var(--muted);margin-top:2px}
.ex-level-row{display:flex;align-items:center;gap:6px;margin-top:4px;flex-wrap:wrap}
.lv-badge{font-size:9px;padding:2px 7px;border-radius:10px;font-family:var(--fh);font-weight:700;letter-spacing:0.5px}
.lv1{background:rgba(200,245,90,0.15);color:var(--accent)}
.lv2{background:rgba(245,200,90,0.15);color:var(--legs)}
.lv3{background:rgba(245,90,140,0.15);color:var(--push)}
.lv4{background:rgba(90,140,245,0.15);color:var(--core)}
.lv5{background:rgba(90,245,200,0.15);color:var(--pull)}
.lv6{background:rgba(180,90,245,0.15);color:#c85af5}
.consec-dots{display:flex;gap:3px}
.cdot{width:7px;height:7px;border-radius:50%;border:1px solid var(--muted)}
.cdot.filled{background:var(--accent);border-color:var(--accent)}
.ex-chevron{color:var(--muted);font-size:16px;transition:transform 0.25s;flex-shrink:0}
.ex-card.open .ex-chevron{transform:rotate(180deg)}

/* EXPANDED DETAIL */
.ex-detail{max-height:0;overflow:hidden;transition:max-height 0.35s ease}
.ex-card.open .ex-detail{max-height:800px}
.ex-detail-inner{padding:4px 14px 14px;border-top:1px solid var(--border)}

.prog-bar-wrap{margin:10px 0 8px}
.prog-bar-label{display:flex;justify-content:space-between;font-size:10px;color:var(--muted);margin-bottom:4px}
.prog-track{height:4px;background:var(--surface2);border-radius:2px;display:flex;gap:2px}
.prog-seg{flex:1;height:100%;border-radius:1px;transition:background 0.3s}
.prog-seg.seg-done{background:var(--accent)}
.prog-seg.seg-current{background:rgba(200,245,90,0.4)}
.prog-seg.seg-future{background:var(--surface2)}

.muscles-tag{display:inline-block;padding:3px 10px;background:var(--surface2);border-radius:20px;font-size:10px;color:var(--muted);margin-bottom:8px}
.video-btn{display:flex;align-items:center;gap:8px;padding:10px 12px;background:rgba(90,140,245,0.1);border:1px solid rgba(90,140,245,0.25);border-radius:var(--r-sm);color:var(--core);font-size:12px;text-decoration:none;margin-bottom:10px}
.play-icon{width:22px;height:22px;border-radius:50%;background:var(--core);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.play-icon svg{width:10px;fill:var(--bg)}
.ex-tip{font-size:12px;color:var(--accent2);padding:10px 12px;background:rgba(90,245,200,0.06);border-radius:var(--r-sm);margin-bottom:10px;line-height:1.5}
.ex-steps{list-style:none;margin-bottom:10px}
.ex-steps li{font-size:12px;color:var(--muted);padding:5px 0;border-bottom:1px solid var(--border);display:flex;gap:8px}
.ex-steps li:last-child{border-bottom:none}
.step-n{color:var(--accent);font-weight:700;flex-shrink:0}

.next-box{background:rgba(200,245,90,0.05);border:1px solid rgba(200,245,90,0.15);border-radius:var(--r-sm);padding:10px 12px;margin-bottom:10px}
.next-label{font-size:9px;color:rgba(200,245,90,0.6);letter-spacing:1.5px;font-family:var(--fh);margin-bottom:3px}
.next-name{font-size:12px;color:var(--accent);font-family:var(--fh);font-weight:700}
.next-sub{font-size:11px;color:var(--muted);margin-top:2px}

/* LOG */
.log-section{padding:10px 14px;background:var(--surface2);border-top:1px solid var(--border)}
.log-label{font-size:9px;color:var(--muted);letter-spacing:1.5px;font-family:var(--fh);margin-bottom:8px}
.log-sets{display:flex;gap:6px;flex-wrap:wrap}
.set-btn{min-width:56px;padding:7px 10px;border-radius:var(--r-sm);background:var(--surface);border:1px solid var(--border);color:var(--muted);font-size:11px;font-family:var(--fm);cursor:pointer;text-align:center;transition:all 0.15s;display:flex;flex-direction:column;align-items:center;gap:2px}
.set-btn .set-lbl{font-size:9px;color:var(--muted)}
.set-btn.set-done{border-color:var(--accent);color:var(--accent);background:rgba(200,245,90,0.08)}
.set-btn.set-done .set-lbl{color:rgba(200,245,90,0.5)}

/* TOAST */
.toast{position:fixed;top:80px;left:50%;transform:translateX(-50%) translateY(-10px);background:var(--accent);color:var(--bg);padding:12px 20px;border-radius:var(--r);font-family:var(--fh);font-size:13px;font-weight:700;z-index:900;opacity:0;transition:all 0.35s;pointer-events:none;white-space:nowrap;max-width:90vw;text-align:center}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.8);display:flex;align-items:flex-end;z-index:800;opacity:0;pointer-events:none;transition:opacity 0.25s}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal-sheet{width:100%;background:var(--surface);border-radius:24px 24px 0 0;padding:24px 24px calc(32px + env(safe-area-inset-bottom,0px));transform:translateY(100%);transition:transform 0.3s cubic-bezier(0.34,1.56,0.64,1)}
.modal-overlay.open .modal-sheet{transform:translateY(0)}
.modal-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 20px}
.modal-title{font-family:var(--fh);font-size:17px;font-weight:700;margin-bottom:3px}
.modal-sub{font-size:12px;color:var(--muted);margin-bottom:22px}
.rep-picker{display:flex;align-items:center;justify-content:center;gap:28px;margin-bottom:24px}
.rep-btn{width:52px;height:52px;border-radius:50%;background:var(--surface2);border:1px solid var(--border);color:var(--text);font-size:28px;cursor:pointer;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent}
.rep-num{font-family:var(--fh);font-size:56px;font-weight:800;color:var(--accent);min-width:90px;text-align:center;line-height:1}
.modal-confirm{width:100%;padding:16px;background:var(--accent);color:var(--bg);border:none;border-radius:var(--r);font-family:var(--fh);font-size:16px;font-weight:700;cursor:pointer}
.modal-skip{width:100%;padding:12px;background:none;border:none;color:var(--muted);font-family:var(--fm);font-size:13px;cursor:pointer;margin-top:6px}

/* REST DAY */
.rest-view{padding:32px 0;text-align:center}
.rest-emoji{font-size:56px;margin-bottom:16px}
.rest-title{font-family:var(--fh);font-size:26px;font-weight:800;margin-bottom:8px}
.rest-desc{font-size:13px;color:var(--muted);line-height:1.7}
.rest-activities{margin-top:20px;display:flex;flex-direction:column;gap:8px}
.rest-act{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-sm);padding:12px 14px;font-size:13px;color:var(--muted);text-align:left}

/* HISTORY */
.hist-title{font-family:var(--fh);font-size:22px;font-weight:800;padding:18px 0 14px}
.hist-entry{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;margin-bottom:10px}
.hist-day{font-family:var(--fh);font-size:13px;font-weight:700;color:var(--accent)}
.hist-date{font-size:11px;color:var(--muted);margin-bottom:8px}
.hist-ex{font-size:12px;color:var(--text);padding:4px 0;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;gap:8px}
.hist-ex:last-child{border-bottom:none}
.hist-sets-detail{font-size:11px;color:var(--muted);text-align:right}
.empty-hist{text-align:center;color:var(--muted);font-size:14px;padding:48px 0;line-height:2}
  /* TIMER */
.timer-bar{background:var(--surface2);border-radius:0 0 var(--r) var(--r);padding:10px 14px;border-top:1px solid var(--border)}
.timer-display{display:flex;align-items:center;justify-content:space-between;gap:10px}
.timer-countdown{font-family:var(--fh);font-size:28px;font-weight:800;color:var(--accent);min-width:60px}
.timer-countdown.warning{color:var(--legs)}
.timer-countdown.urgent{color:var(--push)}
.timer-label{font-size:10px;color:var(--muted);letter-spacing:1.5px;font-family:var(--fh)}
.timer-track{height:3px;background:var(--border);border-radius:2px;margin-top:6px;overflow:hidden}
.timer-fill{height:100%;background:var(--accent);border-radius:2px;transition:width 0.9s linear}
.timer-fill.warning{background:var(--legs)}
.timer-fill.urgent{background:var(--push)}
.iso-start-btn{width:100%;padding:11px;background:rgba(200,245,90,0.1);border:1px solid rgba(200,245,90,0.3);border-radius:var(--r-sm);color:var(--accent);font-family:var(--fh);font-size:13px;font-weight:700;cursor:pointer;margin-top:8px}
</style>
</head>
<body>

<div id="splash">
  <div class="logo">Zero2Hero</div>
  <div class="sub">PROGRESSIONE CONTINUA</div>
</div>

<div id="app">
  <div class="topbar">
    <div>
      <div class="topbar-logo">Zero2Hero</div>
      <div class="topbar-date" id="topbar-date"></div>
    </div>
    <div class="topbar-streak"><div class="streak-dot"></div><span id="streak-count">0 giorni</span></div>
  </div>

  <div id="main-view">
    <div class="day-tabs" id="day-tabs"></div>
    <div class="scroll-area" id="scroll-area"></div>
  </div>

  <div id="history-view">
    <div class="hist-title">Storico allenamenti</div>
    <div id="hist-content"></div>
  </div>

  <div class="bottom-bar">
    <button class="nav-btn active" id="nav-today" onclick="showMain()"><span class="nav-icon">⚡</span><span>Oggi</span></button>
    <button class="nav-btn" id="nav-hist" onclick="showHistory()"><span class="nav-icon">📋</span><span>Storico</span></button>
  </div>
</div>

<div class="toast" id="toast"></div>

<div class="modal-overlay" id="modal">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modal-title"></div>
    <div class="modal-sub" id="modal-sub"></div>
    <div class="rep-picker">
      <button class="rep-btn" onclick="changeRep(-1)">−</button>
      <div class="rep-num" id="rep-num">10</div>
      <button class="rep-btn" onclick="changeRep(+1)">+</button>
    </div>
    <button class="modal-confirm" onclick="confirmRep()">✓ Conferma serie</button>
    <button class="modal-skip" onclick="closeModal()">Annulla</button>
  </div>
</div>

<script>
// ─────────────────────────────────────────────────────────────
// PROGRESSION CHAINS
// Partenza calibrata su 2 settimane pregresse + prestazione di oggi
// ─────────────────────────────────────────────────────────────
const CHAINS = {

  // GIORNO 1 — PUSH ─────────────────────────────────────────

  pushup: [
    // LV 0 — punto di partenza: già a 3×10 sulle ginocchia
    { name:"Flessioni sulle ginocchia", sets:3, reps:10, iso:false,
      sets_label:"3 × 10 rip", rest:"90 sec tra le serie",
      tip:"Sei già a 10 rip per 3 serie: mantieni la forma perfetta. Gomiti a 45°, non a 90°.",
      muscles:"Petto · spalle · tricipiti",
      steps:["Mani a larghezza spalle, ginocchia a terra","Linea retta ginocchia → testa","Scendi lento (2 sec), petto sfiora il suolo","Spingi su espirando. Gomiti a 45°"],
      ytq:"flessioni sulle ginocchia forma corretta tutorial" },
    { name:"Flessioni sulle ginocchia (3×12)", sets:3, reps:12, iso:false,
      sets_label:"3 × 12 rip", rest:"90 sec tra le serie",
      tip:"Volume aumentato. Se le ultime 2 rip dell'ultima serie sono pulite, sei pronto al livello successivo.",
      muscles:"Petto · spalle · tricipiti",
      steps:["Stessa forma del livello precedente","Concentrati sulla discesa lenta (3 sec)","Spingi su esplosivo","Ultima serie al limite: forma prima di tutto"],
      ytq:"flessioni ginocchia tutorial volume" },
    { name:"Flessioni sulle ginocchia + negative (3×8+3)", sets:3, reps:8, iso:false,
      sets_label:"3 × 8 rip + 3 negative", rest:"90 sec tra le serie",
      tip:"8 normali, poi 3 negative lentissime (5 sec giù). Le negative costruiscono forza più in fretta.",
      muscles:"Petto · spalle · tricipiti (eccentrico)",
      steps:["8 flessioni normali sulle ginocchia","Poi 3 negative: parti in alto, scendi in 5 secondi","Arriva al suolo con controllo","Aiutati con le ginocchia per tornare su"],
      ytq:"flessioni negative tutorial forza" },
    { name:"Flessioni tradizionali (3×5)", sets:3, reps:5, iso:false,
      sets_label:"3 × 5 rip", rest:"2 min tra le serie",
      tip:"Solo 5 rip, ma tutte perfette. Se non riesci, finisci la serie sulle ginocchia senza vergogna.",
      muscles:"Petto · spalle · tricipiti",
      steps:["Corpo rigido dalla testa ai talloni — nessuna gobba","Mani leggermente più larghe delle spalle","Scendi lento (2 sec), torace al suolo","Spingi su veloce espirando"],
      ytq:"flessioni tradizionali forma perfetta tutorial" },
    { name:"Flessioni tradizionali (3×8)", sets:3, reps:8, iso:false,
      sets_label:"3 × 8 rip", rest:"2 min tra le serie",
      tip:"8 rip consecutive pulite per 3 serie: sei diventato forte.",
      muscles:"Petto · spalle · tricipiti",
      steps:["Posizione plank rigida","Gomiti a 45°","Petto tocca il suolo","Spingi esplosivo"],
      ytq:"flessioni perfette tutorial italiano" },
    { name:"Flessioni tradizionali (3×12)", sets:3, reps:12, iso:false,
      sets_label:"3 × 12 rip", rest:"90 sec tra le serie",
      tip:"12 rip pulite. Da qui in poi le varianti si fanno interessanti.",
      muscles:"Petto · spalle · tricipiti",
      steps:["Stessa forma","Ritmo costante, no affanni","Ultimo set al limite","Forma > velocità"],
      ytq:"flessioni 12 ripetizioni tutorial" },
    { name:"Flessioni a diamante (3×8)", sets:3, reps:8, iso:false,
      sets_label:"3 × 8 rip", rest:"2 min tra le serie",
      tip:"Mani vicine sotto il petto. Isola i tricipiti e il petto interno.",
      muscles:"Tricipiti · petto interno · spalle",
      steps:["Mani vicine: pollici e indici si sfiorano","Corpo rigido","Gomiti vicini al busto nella discesa","Spingi su"],
      ytq:"diamond push up tutorial tricipiti" },
    { name:"Archer push-up (3×6 per lato)", sets:3, reps:6, iso:false,
      sets_label:"3 × 6 rip/lato", rest:"2 min tra le serie",
      tip:"Precursore della flessione a un braccio. Mani larghissime, tutto il peso su un lato.",
      muscles:"Petto · spalle · tricipiti (unilaterale)",
      steps:["Mani molto larghe, quasi a braccia tese","Sposta il peso su un lato piegando quel gomito","L'altro braccio rimane quasi teso di supporto","Spingi su e ripeti dall'altro lato"],
      ytq:"archer push up tutorial progressione" }
  ],

  dips: [
    // LV 0 — punto di partenza: 3×8 gambe piegate
    { name:"Dips su sedia (gambe piegate)", sets:3, reps:8, iso:false,
      sets_label:"3 × 8 rip", rest:"90 sec tra le serie",
      tip:"Punto di partenza corretto. Schiena vicina alla sedia, scendi fino a 90° ai gomiti.",
      muscles:"Tricipiti · spalle · petto basso",

// ─── STATE & STORAGE ─────────────────────────────────────────
const CONSEC_NEEDED = 3;
let state = {};
let currentDay = 0;
let modalCtx = null;
let currentRep = 10;

function loadState(){ try{ state=JSON.parse(localStorage.getItem('caliAM_v3')||'{}'); }catch(e){ state={}; } }
function saveState(){ localStorage.setItem('caliAM_v3',JSON.stringify(state)); }

function getLevel(chain){ return state['lv_'+chain]||0; }
function setLevel(chain,lv){ state['lv_'+chain]=lv; saveState(); }
function getConsec(chain){ return state['con_'+chain]||0; }
function setConsec(chain,n){ state['con_'+chain]=n; saveState(); }

function getExDef(chain){
  const cd=CHAINS[chain];
  if(!cd) return null;
  return cd[Math.min(getLevel(chain),cd.length-1)];
}

function todayStr(){ return new Date().toISOString().slice(0,10); }
function setKey(di,ci,si){ return todayStr()+'_d'+di+'_c'+ci+'_s'+si; }

function getTodayIdx(){
  const map=[6,0,1,2,3,4,5];
  return map[new Date().getDay()];
}

// ─── PROGRESSION ─────────────────────────────────────────────
function markChainConsec(chain, dayIdx, chainIdx){
  const cd=CHAINS[chain];
  if(!cd) return false;
  const lv=getLevel(chain);
  if(lv>=cd.length-1) return false;
  const ex=getExDef(chain);
  const nSets=ex.sets;
  const allDone=Array.from({length:nSets},(_,s)=>state[setKey(dayIdx,chainIdx,s)]).every(Boolean);
  if(!allDone) return false;
  const newCon=getConsec(chain)+1;
  setConsec(chain,newCon);
  if(newCon>=CONSEC_NEEDED){
    // salva il livello da applicare domani, non subito
    state['pending_lv_'+chain]={lv:lv+1, date:todayStr()};
    saveState();
    return true; // notifica il toast ma non cambia il livello ora
  }
  return false;
}
function applyPendingLevels(){
  const today=todayStr();
  Object.keys(state).forEach(k=>{
    if(k.startsWith('pending_lv_')){
      const chain=k.replace('pending_lv_','');
      const pending=state[k];
      if(pending && pending.date !== today){
        setLevel(chain, pending.lv);
        setConsec(chain, 0);
        delete state[k];
        saveState();
      }
    }
  });
}

}

        </div>

 html+=`<div class="phase-card" style="margin-top:10px">

  area.innerHTML=html;

function openModal(di,ci,si){
  const chain=DAYS[di].exercises[ci].chain;
  const ex=getExDef(chain);
  modalCtx={di,ci,si,chain};
  const existing=state[setKey(di,ci,si)];
  currentRep=existing||(ex.reps||10);
  document.getElementById('modal-title').textContent=ex.name+' — Serie '+(si+1);
  document.getElementById('modal-sub').textContent=ex.iso?'Quanti secondi hai tenuto?':'Quante ripetizioni hai fatto?';
  document.getElementById('rep-num').textContent=currentRep;
  document.getElementById('modal').classList.add('open');
}
function closeModal(){ document.getElementById('modal').classList.remove('open'); modalCtx=null; }
function changeRep(d){ currentRep=Math.max(1,currentRep+d); document.getElementById('rep-num').textContent=currentRep; }
function confirmRep(){
  if(!modalCtx) return;
  const {di,ci,si,chain}=modalCtx;
 state[setKey(di,ci,si)]=currentRep;
  // salva il nome esercizio al momento dell'allenamento
  const exNameKey=todayStr()+'_d'+di+'_c'+ci+'_name';
  if(!state[exNameKey]) state[exNameKey]=getExDef(chain).name;
   const exIsoKey=todayStr()+'_d'+di+'_c'+ci+'_iso';
  if(!state[exIsoKey]) state[exIsoKey]=getExDef(chain).iso;
  saveState();
  closeModal();
  const leveled=markChainConsec(chain,di,ci);
  if(leveled){
    const newEx=getExDef(chain);
    showToast('🆙 Livello salito! → '+newEx.name);
  }
  const restSecs = getRestSeconds(chain);
  const cardId = ci;
  renderAll();
  setTimeout(()=>{
    const card=document.getElementById('exc-'+ci);
    const det=document.getElementById('exd-'+ci);
    if(card&&det){ card.classList.add('open'); det.style.maxHeight='800px'; }
    startTimer('rest', restSecs, cardId);
  },60);
}

function renderStreak(){
  let streak=0;
  const today=new Date();
  for(let i=0;i<60;i++){
    const d=new Date(today);d.setDate(today.getDate()-i);
    const ds=d.toISOString().slice(0,10);

function renderHistory(){
  const el=document.getElementById('hist-content');
  const keys=Object.keys(state).filter(k=>k.startsWith('done_'));
  if(!keys.length){el.innerHTML='<div class="empty-hist">Nessun allenamento ancora.<br>Inizia oggi! 💪</div>';return;}
  const entries=[];
  keys.sort().reverse().forEach(k=>{
    const p=k.replace('done_','').split('_');
    const ds=p[0];const di=parseInt(p[1]);
    const day=DAYS[di];
    if(!day||!day.exercises) return;
    const df=new Date(ds).toLocaleDateString('it-IT',{weekday:'long',day:'numeric',month:'long'});
    let exH='';
   day.exercises.forEach((exRef,ci)=>{
      const ex=getExDef(exRef.chain);
      if(!ex) return;
      const savedName=state[ds+'_d'+di+'_c'+ci+'_name']||ex.name;
      const savedIso=state[ds+'_d'+di+'_c'+ci+'_iso']!==undefined?state[ds+'_d'+di+'_c'+ci+'_iso']:ex.iso;
      const sets=[];
      for(let s=0;s<ex.sets;s++){
        const v=state[ds+'_d'+di+'_c'+ci+'_s'+s];
        if(v!=null) sets.push(v);
      }
      // cerca anche serie extra oltre ex.sets (per il bug della S4)
      for(let s=ex.sets;s<ex.sets+3;s++){
        const v=state[ds+'_d'+di+'_c'+ci+'_s'+s];
        if(v!=null) sets.push(v);
      }
      if(sets.length) exH+=`<div class="hist-ex"><span>${savedName}</span><span class="hist-sets-detail">${sets.map((v,i)=>'S'+(i+1)+':'+v+(savedIso?'s':'×')).join(' ')}</span></div>`;
    });
    // Extra esercizi
    const extraKey='extras_'+ds+'_d'+di;
    const extras=state[extraKey]||[];
    extras.forEach(ex=>{
      exH+=`<div class="hist-ex" style="border-color:rgba(200,245,90,0.15)"><span style="color:var(--accent)">⭐ ${ex.name}</span><span class="hist-sets-detail">${ex.sets.map((v,s)=>'S'+(s+1)+':'+v+(ex.iso?'s':'×')).join(' ')}</span></div>`;
    });
    if(exH) entries.push(`<div class="hist-entry"><div class="hist-day">${day.name} — ${day.title||''}</div><div class="hist-date">${df}</div>${exH}</div>`);
  });
  el.innerHTML=entries.join('')||'<div class="empty-hist">Nessun dato registrato.</div>';
}

let timerInterval = null;
let timerState = null;
let wakeLock = null;

async function requestWakeLock(){
  try{
    if('wakeLock' in navigator){
      wakeLock = await navigator.wakeLock.request('screen');
    }
  }catch(e){}
}
function releaseWakeLock(){
  if(wakeLock){ wakeLock.release(); wakeLock=null; }
}

function beep(freq=880, dur=150, vol=0.3){
  try{
    const ctx = new (window.AudioContext||window.webkitAudioContext)();
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.frequency.value = freq;
    g.gain.setValueAtTime(vol, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+dur/1000);
    o.start(ctx.currentTime);
    o.stop(ctx.currentTime+dur/1000);
  }catch(e){}
}

function vibrateAndBeep(){ 
  if(navigator.vibrate) navigator.vibrate([100,50,100]);
  beep(880, 200, 0.3);
}

function getRestSeconds(chain){
  const ex = getExDef(chain);
  if(!ex) return 90;
  const r = ex.rest||'';
  if(r.includes('2 min')) return 120;
  if(r.includes('90')) return 90;
  if(r.includes('60')) return 60;
  return 90;
}

function startIsoTimer(di, ci){
  const chain = DAYS[di].exercises[ci].chain;
  const ex = getExDef(chain);
  const targetSecs = ex.reps || 30;
  const sides = ex.sides || 1;
  startPreCounter(targetSecs, ci, sides);
}

function startAmrapTimer(di, ci){
  const chain = DAYS[di].exercises[ci].chain;
  const ex = getExDef(chain);
  const totalSecs = (ex.amrapMins||5)*60;
  startAmrapPreCounter(totalSecs, ci);
}

function startAmrapPreCounter(totalSecs, exCardId){
  clearTimer();
  requestWakeLock();
  let countdown = 3;
  timerState = {type:'amrap-pre', total:3, remaining:countdown, exCardId, totalSecs};
  renderTimerInCard(exCardId);
  beep(440, 100, 0.2);
  timerInterval = setInterval(()=>{
    countdown--;
    if(countdown <= 0){
      clearInterval(timerInterval); timerInterval=null;
      beep(660, 200, 0.4);
      startAmrapExecTimer(totalSecs, exCardId);
    } else {
      timerState.remaining = countdown;
      beep(440, 100, 0.2);
      renderTimerInCard(exCardId);
    }
  }, 1000);
}

function startAmrapExecTimer(totalSecs, exCardId){
  timerState = {type:'amrap', total:totalSecs, remaining:totalSecs, exCardId};
  renderTimerInCard(exCardId);
  timerInterval = setInterval(()=>{
    timerState.remaining--;
    if(timerState.remaining <= 0){
      clearInterval(timerInterval); timerInterval=null;
      vibrateAndBeep();
      setTimeout(()=>beep(880,300,0.4),300);
      setTimeout(()=>beep(880,300,0.4),700);
      timerState=null;
      releaseWakeLock();
      renderTimerInCard(exCardId);
      showToast('🏁 AMRAP terminato! Segna i giri!');
    } else {
      if(timerState.remaining===10) beep(440,100,0.15);
      if(timerState.remaining===5) beep(440,100,0.2);
      if(timerState.remaining===3) beep(440,100,0.2);
      renderTimerInCard(exCardId);
    }
  }, 1000);
}
  
function startPreCounter(targetSecs, exCardId, sidesRemaining=1, currentSide=1){
  clearTimer();
  requestWakeLock();
  let countdown = 3;
  timerState = {type:'pre', total:3, remaining:countdown, exCardId, targetSecs, sides:sidesRemaining, currentSide};
  renderTimerInCard(exCardId);
  beep(440, 100, 0.2);
  timerInterval = setInterval(()=>{
    countdown--;
    if(countdown <= 0){
      clearInterval(timerInterval);
      timerInterval = null;
      beep(660, 150, 0.3);
      startExecTimer(targetSecs, exCardId, sidesRemaining, currentSide);
    } else {
      timerState.remaining = countdown;
      beep(440, 100, 0.2);
      renderTimerInCard(exCardId);
    }
  }, 1000);
}

function startExecTimer(targetSecs, exCardId, sides=1, currentSide=1){
  let elapsed = 0;
  let beeped = false;
  timerState = {type:'exec', total:targetSecs, elapsed:0, exCardId, targetSecs, sides, currentSide};
  renderTimerInCard(exCardId);
  timerInterval = setInterval(()=>{
    elapsed++;
    timerState.elapsed = elapsed;
    if(elapsed === targetSecs && !beeped){
      beeped = true;
      vibrateAndBeep();
      setTimeout(()=>beep(880,150,0.3), 250);
      // se ci sono altri lati, parte il pre-counter per il prossimo
      if(currentSide < sides){
        setTimeout(()=>{
          clearInterval(timerInterval);
          timerInterval=null;
          startPreCounter(targetSecs, exCardId, sides - currentSide, currentSide+1);
        }, 1500);
      }
    }
    renderTimerInCard(exCardId);
  }, 1000);
}

function startTimer(type, seconds, exCardId){
  clearTimer();
  requestWakeLock();
  timerState = {type, total:seconds, remaining:seconds, exCardId};
  renderTimerInCard(exCardId);
  timerInterval = setInterval(()=>{
    timerState.remaining--;
    if(timerState.remaining <= 0){
      clearInterval(timerInterval); timerInterval=null;
      vibrateAndBeep();
      timerState = null;
      releaseWakeLock();
      renderTimerInCard(exCardId);
    } else {
      if(timerState.remaining === 3) beep(440, 100, 0.15);
      renderTimerInCard(exCardId);
    }
  }, 1000);
}

function clearTimer(){
  if(timerInterval){ clearInterval(timerInterval); timerInterval=null; }
  timerState=null;
  releaseWakeLock();
}

function stopIsoTimer(ci){
  if(!timerState || timerState.type !== 'exec') return;
  const elapsed = timerState.elapsed || 0;
  clearTimer();
  // apri il modal con il tempo già precompilato
  const chain = DAYS[currentDay].exercises[ci].chain;
  const ex = getExDef(chain);
  modalCtx = {di:currentDay, ci, si:findNextSet(currentDay, ci), chain};
  currentRep = elapsed;
  document.getElementById('modal-title').textContent = ex.name + ' — Serie '+(modalCtx.si+1);
  document.getElementById('modal-sub').textContent = 'Secondi tenuti (modificabile):';
  document.getElementById('rep-num').textContent = currentRep;
  document.getElementById('modal').classList.add('open');
}

function findNextSet(di, ci){
  const chain = DAYS[di].exercises[ci].chain;
  const ex = getExDef(chain);
  for(let s=0; s<ex.sets; s++){
    if(!state[setKey(di,ci,s)]) return s;
  }
  return ex.sets-1;
}

function renderTimerInCard(exCardId){
  const el = document.getElementById('timer-'+exCardId);
  if(!el) return;
  if(!timerState || timerState.exCardId !== exCardId){ el.innerHTML=''; return; }

  const {type} = timerState;

  if(type === 'pre'){
    const {remaining, currentSide, sides} = timerState;
    const sideLabel = (sides>1||currentSide>1) ? ` — LATO ${currentSide}` : '';
    el.innerHTML=`
      <div class="timer-bar" style="text-align:center">
        <div class="timer-label">PREPARATI${sideLabel}</div>
        <div class="timer-countdown" style="font-size:42px;text-align:center;padding:8px 0">${remaining}</div>
      </div>`;
    return;
  }

  if(type === 'exec'){
    const {elapsed, targetSecs, currentSide, sides} = timerState;
    const overTarget = elapsed >= targetSecs;
    const display = elapsed;
    const barPct = Math.min(Math.round((elapsed/targetSecs)*100), 100);
    const sideLabel = sides>1 ? ` — LATO ${currentSide}` : '';
    el.innerHTML=`
      <div class="timer-bar">
        <div class="timer-label">${overTarget ? '🔥 OLTRE IL TARGET!' : 'TIENI LA POSIZIONE'+sideLabel}</div>
        <div class="timer-display">
          <div class="timer-countdown ${overTarget?'urgent':''}">${display}"</div>
          <div style="font-size:11px;color:var(--muted)">target: ${targetSecs}"</div>
        </div>
        <div class="timer-track">
          <div class="timer-fill ${overTarget?'urgent':''}" style="width:${barPct}%;${overTarget?'background:var(--push)':'background:var(--core)'}"></div>
        </div>
        ${!overTarget||currentSide>=sides?`<button onclick="event.stopPropagation();stopIsoTimer(${exCardId})" style="width:100%;margin-top:8px;padding:10px;background:rgba(200,245,90,0.1);border:1px solid rgba(200,245,90,0.3);border-radius:var(--r-sm);color:var(--accent);font-family:var(--fh);font-size:13px;font-weight:700;cursor:pointer">
          ⏹ Stop e registra ${display}"
        </button>`:''}
      </div>`;
    return;
  }

  if(type === 'amrap-pre'){
    const {remaining} = timerState;
    el.innerHTML=`
      <div class="timer-bar" style="text-align:center">
        <div class="timer-label">PREPARATI — AMRAP</div>
        <div class="timer-countdown" style="font-size:42px;text-align:center;padding:8px 0">${remaining}</div>
      </div>`;
    return;
  }

  if(type === 'amrap'){
    const {total, remaining} = timerState;
    const pct = Math.round((remaining/total)*100);
    const mins = Math.floor(remaining/60);
    const secs = remaining%60;
    const display = mins>0?`${mins}:${secs.toString().padStart(2,'0')}`:`${remaining}`;
    const urgentClass = remaining<=10?'urgent':remaining<=30?'warning':'';
    el.innerHTML=`
      <div class="timer-bar">
        <div class="timer-label">🏃 AMRAP IN CORSO</div>
        <div class="timer-display">
          <div class="timer-countdown ${urgentClass}">${display}</div>
          <div style="font-size:11px;color:var(--muted)">vai senza fermarti!</div>
        </div>
        <div class="timer-track">
          <div class="timer-fill ${urgentClass}" style="width:${pct}%"></div>
        </div>
      </div>`;
    return;
  }
  
  // type === 'rest'
  const {total, remaining} = timerState;
  const pct = Math.round((remaining/total)*100);
  const mins = Math.floor(remaining/60);
  const secs = remaining%60;
  const display = mins>0 ? `${mins}:${secs.toString().padStart(2,'0')}` : `${remaining}`;
  const urgentClass = remaining<=5?'urgent':remaining<=10?'warning':'';
  el.innerHTML=`
    <div class="timer-bar">
      <div class="timer-label">RIPOSO</div>
      <div class="timer-display">
        <div class="timer-countdown ${urgentClass}">${display}"</div>
        <div style="font-size:11px;color:var(--muted)">poi riparte</div>
      </div>
      <div class="timer-track">
        <div class="timer-fill ${urgentClass}" style="width:${pct}%"></div>
      </div>
    </div>`;
}
  function adminSet(key, value){
  const s=JSON.parse(localStorage.getItem('caliAM_v3')||'{}');
  s[key]=value;
  localStorage.setItem('caliAM_v3',JSON.stringify(s));
  renderAll();
  alert('Fatto! '+key+' = '+value);
}
function renderAll(){ renderTabs(); renderDay(); renderStreak(); }
function updateDate(){ document.getElementById('topbar-date').textContent=new Date().toLocaleDateString('it-IT',{weekday:'long',day:'numeric',month:'long'}); }

loadState();
applyPendingLevels();
currentDay=getTodayIdx();
updateDate();
setTimeout(()=>{ document.getElementById('splash').classList.add('hide'); renderAll(); },1200);
</script>
