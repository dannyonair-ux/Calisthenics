<!DOCTYPE html>
<html lang="it">
<head>

<link rel="apple-touch-icon" href="icona.png">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">

<title>Zero2Hero</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0f1117;--surface:#181c26;--surface2:#1f2435;--border:rgba(255,255,255,0.07);
  --accent:#c8f55a;--accent2:#5af5c8;--accent3:#f55a8c;
  --text:#f0f0ec;--muted:#8890a8;
  --push:#f55a8c;--pull:#5af5c8;--legs:#f5c85a;--core:#5a8cf5;--full:#c8f55a;
  --r:14px;--r-sm:8px;
  --fh:'Syne',sans-serif;--fm:'DM Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{height:100%}
body{height:100%;background:var(--bg);color:var(--text);font-family:var(--fm);overflow:hidden}

/* SPLASH */
#splash{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:1000;gap:10px;transition:opacity 0.5s}
#splash .logo{font-family:var(--fh);font-size:clamp(28px,10vw,52px);font-weight:800;color:var(--accent);letter-spacing:-2px;text-align:center;padding:0 16px}
#splash .sub{font-size:clamp(9px,3vw,11px);color:var(--muted);letter-spacing:3px;text-align:center;padding:0 16px}
#splash.hide{opacity:0;pointer-events:none}

/* APP SHELL - fixed layout, scroll only inside content */
#app{position:fixed;inset:0;display:flex;flex-direction:column;overflow:hidden}

/* TOP BAR */
.topbar{flex-shrink:0;padding:14px 20px 10px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);background:var(--bg)}
.topbar-logo{font-family:var(--fh);font-size:22px;font-weight:800;color:var(--accent);letter-spacing:-1px}
.topbar-date{font-size:11px;color:var(--muted);margin-top:2px}
.topbar-streak{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--accent)}
.streak-dot{width:8px;height:8px;border-radius:50%;background:var(--accent)}

/* DAY TABS */
.day-tabs{flex-shrink:0;display:flex;gap:6px;padding:10px 20px;overflow-x:auto;scrollbar-width:none;background:var(--bg);border-bottom:1px solid var(--border)}
.day-tabs::-webkit-scrollbar{display:none}
.day-tab{flex-shrink:0;padding:6px 14px;border-radius:20px;font-size:11px;font-weight:500;font-family:var(--fh);border:1px solid var(--border);background:var(--surface);color:var(--muted);cursor:pointer;transition:all 0.2s}
.day-tab.today{border-color:var(--accent);color:var(--accent)}
.day-tab.active{background:var(--accent);color:var(--bg);border-color:var(--accent);font-weight:700}
.day-tab.done-tab{border-color:rgba(200,245,90,0.3);color:rgba(200,245,90,0.5)}

/* MAIN CONTENT AREA — THIS IS THE SCROLLABLE PART */
#main-view{flex:1;overflow:hidden;display:flex;flex-direction:column;min-height:0}
.scroll-area{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0 16px 100px}

/* HISTORY VIEW */
#history-view{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0 16px 100px;display:none}
#history-view.visible{display:block}
#main-view.hidden{display:none}

/* BOTTOM NAV */
.bottom-bar{flex-shrink:0;background:var(--bg);border-top:1px solid var(--border);padding:12px 24px env(safe-area-inset-bottom,20px);display:flex;justify-content:space-around}
.nav-btn{display:flex;flex-direction:column;align-items:center;gap:4px;background:none;border:none;color:var(--muted);font-family:var(--fm);font-size:10px;cursor:pointer;transition:color 0.2s;padding:4px 16px}
.nav-btn.active{color:var(--accent)}
.nav-icon{font-size:20px}

/* DAY HEADER */
.day-header{padding:14px 0 10px}
.day-name{font-family:var(--fh);font-size:26px;font-weight:800;letter-spacing:-1px;line-height:1}
.day-meta{display:flex;align-items:center;gap:8px;margin-top:6px;flex-wrap:wrap}
.focus-badge{padding:3px 10px;border-radius:20px;font-size:10px;font-weight:600;font-family:var(--fh);letter-spacing:1px}
.day-progress{margin-top:10px;height:3px;background:var(--surface2);border-radius:2px;overflow:hidden}
.day-progress-fill{height:100%;background:var(--accent);border-radius:2px;transition:width 0.4s}

/* PHASE CARDS (warmup/cooldown/rest) */
.phase-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;margin-bottom:10px}
.phase-label{font-size:9px;color:var(--muted);letter-spacing:2px;font-family:var(--fh);font-weight:600;margin-bottom:6px}
.phase-row{display:flex;align-items:flex-start;gap:10px;margin-bottom:6px}
.phase-row:last-child{margin-bottom:0}
.phase-icon{font-size:14px;flex-shrink:0;margin-top:1px}
.phase-text{font-size:12px;color:var(--text);line-height:1.5}
.phase-note{font-size:11px;color:var(--muted);line-height:1.5;margin-top:2px}
.rest-chip{display:inline-flex;align-items:center;gap:5px;background:rgba(200,245,90,0.1);border:1px solid rgba(200,245,90,0.2);border-radius:20px;padding:3px 10px;font-size:11px;color:var(--accent);margin:8px 0 4px}

/* EXERCISE CARD */
.ex-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);margin-bottom:10px;overflow:hidden;transition:border-color 0.2s}
.ex-card.done-card{border-color:rgba(200,245,90,0.3);background:rgba(200,245,90,0.03)}
.ex-header{padding:12px 14px;cursor:pointer;display:flex;align-items:center;gap:10px}
.ex-num{width:30px;height:30px;border-radius:50%;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--muted);flex-shrink:0;font-family:var(--fh);font-weight:700;transition:all 0.2s}
.ex-card.done-card .ex-num{background:var(--accent);color:var(--bg);border-color:var(--accent)}
.ex-main{flex:1;min-width:0}
.ex-name{font-family:var(--fh);font-size:14px;font-weight:700}
.ex-sets-line{font-size:12px;color:var(--muted);margin-top:2px}
.ex-level-row{display:flex;align-items:center;gap:6px;margin-top:4px;flex-wrap:wrap}
.lv-badge{font-size:9px;padding:2px 7px;border-radius:10px;font-family:var(--fh);font-weight:700;letter-spacing:0.5px}
.lv1{background:rgba(200,245,90,0.15);color:var(--accent)}
.lv2{background:rgba(245,200,90,0.15);color:var(--legs)}
.lv3{background:rgba(245,90,140,0.15);color:var(--push)}
.lv4{background:rgba(90,140,245,0.15);color:var(--core)}
.lv5{background:rgba(90,245,200,0.15);color:var(--pull)}
.lv6{background:rgba(180,90,245,0.15);color:#c85af5}
.consec-dots{display:flex;gap:3px}
.cdot{width:7px;height:7px;border-radius:50%;border:1px solid var(--muted)}
.cdot.filled{background:var(--accent);border-color:var(--accent)}
.ex-chevron{color:var(--muted);font-size:16px;transition:transform 0.25s;flex-shrink:0}
.ex-card.open .ex-chevron{transform:rotate(180deg)}

/* EXPANDED DETAIL */
.ex-detail{max-height:0;overflow:hidden;transition:max-height 0.35s ease}
.ex-card.open .ex-detail{max-height:800px}
.ex-detail-inner{padding:4px 14px 14px;border-top:1px solid var(--border)}

.prog-bar-wrap{margin:10px 0 8px}
.prog-bar-label{display:flex;justify-content:space-between;font-size:10px;color:var(--muted);margin-bottom:4px}
.prog-track{height:4px;background:var(--surface2);border-radius:2px;display:flex;gap:2px}
.prog-seg{flex:1;height:100%;border-radius:1px;transition:background 0.3s}
.prog-seg.seg-done{background:var(--accent)}
.prog-seg.seg-current{background:rgba(200,245,90,0.4)}
.prog-seg.seg-future{background:var(--surface2)}

.muscles-tag{display:inline-block;padding:3px 10px;background:var(--surface2);border-radius:20px;font-size:10px;color:var(--muted);margin-bottom:8px}
.video-btn{display:flex;align-items:center;gap:8px;padding:10px 12px;background:rgba(90,140,245,0.1);border:1px solid rgba(90,140,245,0.25);border-radius:var(--r-sm);color:var(--core);font-size:12px;text-decoration:none;margin-bottom:10px}
.play-icon{width:22px;height:22px;border-radius:50%;background:var(--core);display:flex;align-items:center;justify-content:center;}
</style>
</head>
